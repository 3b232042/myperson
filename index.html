<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人簡介</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
        .tag { display: inline-block; background: #007bff; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好，我是 [你的名字]</h1>
        <p>目前就讀於國立勤益科技大學 資管系。</p>
        <div>
            <span class="tag">攝影愛好者</span>
            <span class="tag">投資理財</span>
            <span class="tag">網頁開發</span>
        </div>
    </div>
</body>
</html>
